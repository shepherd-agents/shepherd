[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shepherd-providers"
version = "0.2.0"
description = "Provider implementations for shepherd-core (Claude, OpenAI)"
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10.0,<4.0.0"
dependencies = [
    "shepherd-core",
    "shepherd-runtime",
]

[project.optional-dependencies]
claude = ["claude-agent-sdk>=0.1.0"]
openai = ["openai>=1.66"]
openai-mcp = ["openai>=1.66", "mcp>=1.0"]
litellm = ["litellm>=1.40"]
all = [
    "shepherd-providers[claude]",
    "shepherd-providers[openai-mcp]",
    "shepherd-providers[litellm]",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.8.0",
    "ruff>=0.2.0",
]

[project.entry-points."shepherd.providers"]
claude = "shepherd_providers.claude:ClaudeProvider"
openai = "shepherd_providers.openai:OpenAIProvider"

[dependency-groups]
test = [
    "mcp>=1.0",
    "openai>=1.66",
    "pytest>=8.0.0,<9.0.0",
    "pytest-asyncio>=0.23.0,<1.0.0",
    "pytest-socket>=0.7.0,<1.0.0",
]
lint = ["ruff>=0.5.0,<1.0.0"]
typing = [
    "mypy>=1.10.0,<2.0.0",
]

[tool.uv.sources]
shepherd-core = { workspace = true }
shepherd-runtime = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/shepherd_providers"]

[tool.pytest.ini_options]
addopts = "--strict-markers --strict-config --durations=5 -vv"
markers = [
    "slow: marks tests as slow (>1s execution time)",
    "integration: marks tests requiring external resources or network",
    "spike: marks exploratory/documentation tests (not regression tests)",
    "benchmark: marks latency/performance benchmark tests",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.mypy]
plugins = ["pydantic.mypy"]
strict = true
enable_error_code = "deprecated"
warn_unreachable = true

# Ruff: see ruff.toml at workspace root.
