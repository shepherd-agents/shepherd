[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shepherd"
version = "0.3.0"
description = "Effect-based framework for building AI agents with multi-provider support"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
keywords = ["agent", "llm", "claude", "openai", "ai", "effects", "multi-provider"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    # Core framework (always required)
    "shepherd-core",
    "shepherd-dialect",
    "shepherd-export",
    "shepherd-runtime",
    # CLI
    "click>=8.0",
]

[project.scripts]
shepherd = "shepherd.cli:main"
sp = "shepherd.cli:main"

[tool.uv.sources]
shepherd-core = { workspace = true }
shepherd-dialect = { workspace = true }
shepherd-export = { workspace = true }
shepherd-runtime = { workspace = true }
shepherd-transform = { workspace = true }
shepherd-sandboxes = { workspace = true }

[project.optional-dependencies]
# Provider implementations
providers = [
    "shepherd-providers",
]

# Execution contexts
contexts = [
    "shepherd-contexts",
]

# Banking domain
banking = [
    "shepherd-banking",
]

# Remote sandbox integrations
sandboxes = [
    "shepherd-sandboxes",
]

# Advanced transform / grounding tooling
transform = [
    "shepherd-transform",
]

# Individual SDK dependencies (for direct installation)
claude = [
    "shepherd-providers[claude]",
]
openai = [
    "shepherd-providers[openai]",
]
codex = [
    "shepherd-dialect[codex]",
]

# Development dependencies
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
    "pytest-timeout>=2.0",
    "ruff>=0.2.0",
    "mypy>=1.8",
    "gitpython>=3.1.0",
]

# All optional packages
all = [
    "shepherd[providers,contexts,banking,sandboxes,transform,dev]",
]

[project.urls]
Homepage = "https://github.com/anthropics/shepherd"
Documentation = "https://github.com/anthropics/shepherd#readme"
Issues = "https://github.com/anthropics/shepherd/issues"
Changelog = "https://github.com/anthropics/shepherd/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.sdist]
include = ["/src"]

[tool.hatch.build.targets.wheel]
packages = ["src/shepherd"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
# Markers are defined in the root pyproject.toml

# Ruff: see ruff.toml at workspace root.

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_configs = true
