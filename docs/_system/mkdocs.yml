# PROTOTYPE — Shepherd docs system (public / default-deny build).
# Tooling lives in docs_system/; the content trees stay at the repo root
# (docs/shepherd, docs/_src/shepherd, docs/_generated/shepherd) — hence the../ paths
# below. Generators READ the real repo sources (shepherd/) read-only.

site_name: Shepherd
site_description: Program meta-agents in Python.
docs_dir: ../shepherd
site_dir: site/shepherd
use_directory_urls: true

extra:
  shepherd_docs_version: "0.2.0"

# THEME — "Research-Framework Documentation Theme" (locked handoff): warm paper,
# a single teal accent (legacy Shepherd #178D8C), IBM Plex type, light tracked
# headings. Expressed as Material config + extra_css token mapping; the announce
# bar is the one small partial override (overrides/main.html). Light-only — the
# locked design ships no dark variant.
theme:
  name: material
  custom_dir: overrides
  logo: assets/shepherd-logo.svg
  favicon: assets/shepherd-logo.svg
  font: { text: IBM Plex Sans, code: IBM Plex Mono }
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css
  - stylesheets/shepherd-home.css
  - stylesheets/hide-status.css   # live build hides the page-status indicator (reviewer build re-shows it)

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - ../../shepherd/packages/meta/src
            - ../../shepherd/packages/runtime/src
            - ../../shepherd/packages/core/src
          options:
            show_source: false
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            show_if_no_docstring: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["../_src/shepherd"]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# DEFAULT-DENY (DESIGN 1.2, probe-corrected semantics):
# '*' excludes everything (including Material theme assets — hence !assets/**);
# pages are un-excluded with ROOT-ANCHORED '!/...' lines (unanchored '!index.md'
# would un-exclude every future section index); dirs need '!dir/**' (bare
# '!dir/' does not re-include contents). The styled-site assertion in the gate
# guards the silent-CSS failure mode.
exclude_docs: |
  *
  !/index.md
  !/start/index.md
  !/tutorials/index.md
  !/tutorials/first-shepherd-app.md
  !/concepts/index.md
  !/concepts/tasks.md
  !/concepts/effects.md
  !/concepts/runs.md
  !/concepts/workspaces.md
  !/concepts/providers.md
  !/concepts/permissions.md
  !/concepts/placements.md
  !/guides/index.md
  !/guides/grant-repo-access.md
  !/guides/deterministic-demo.md
  !/guides/debug-your-first-run.md
  !/guides/test-shepherd-code.md
  !/guides/route-tasks-to-models.md
  !/reference/cli.md
  !stylesheets/**
  !assets/**

# PUBLIC NAV = the allowlist. Exactly the un-excluded pages, nothing else.
nav:
  - Home: index.md
  - Getting Started:
      - start/index.md
  - Tutorials:
      - tutorials/index.md
      - First Shepherd app: tutorials/first-shepherd-app.md
  - Concepts:
      - concepts/index.md
      - Tasks: concepts/tasks.md
      - Effects: concepts/effects.md
      - Permissions: concepts/permissions.md
      - Placements: concepts/placements.md
      - Runs: concepts/runs.md
      - Workspaces: concepts/workspaces.md
      - Providers: concepts/providers.md
  - Guides:
      - guides/index.md
      - Grant a task repo access: guides/grant-repo-access.md
      - Deterministic demo: guides/deterministic-demo.md
      - Debug your first run: guides/debug-your-first-run.md
      - Test Shepherd code: guides/test-shepherd-code.md
      - Route tasks to models: guides/route-tasks-to-models.md
  - Reference:
      - CLI: reference/cli.md
