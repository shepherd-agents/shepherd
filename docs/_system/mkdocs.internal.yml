# PROTOTYPE — internal/reviewer build. Inherits the public config; widens to
# the full tree via auto-discovered nav (explicit null below — omitting the key
# would INHERIT the public nav instead, probe-proven). Output must never be
# deployed to a public origin.

INHERIT: mkdocs.yml

site_dir: site/internal

extra:
  shepherd_docs_version: "0.2.0 (INTERNAL REVIEWER BUILD)"

# extra_css REPLACES the parent's list under INHERIT, so re-list the base styles
# WITHOUT hide-status.css — that is how the reviewer build keeps showing the
# page-status indicator that the live build (mkdocs.yml) hides.
extra_css:
  - stylesheets/extra.css
  - stylesheets/shepherd-home.css

# Only non-page inputs stay excluded; every doc page is built and auto-naved.
exclude_docs: |
  _templates/
  _runbook.md
  _expected-forward.txt
  reference/api/_map.yml

nav:
