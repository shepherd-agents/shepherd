# pages.yml — the definition of every documentation page: what produces it, from
# what, and how its code is validated. Source of truth the runbook describes in
# prose. Layout follows (docs/shepherd/, docs/_src/shepherd/,
# docs/_generated/shepherd/). Driver: `run.py pages`.
#
# Two producers:
# reference — generated from the code; quality is set by the docstrings.
# authored — written prose (draft -> fact-check -> readability -> sign-off).

reference:
  producer: reference
  generate: scripts/gen_shepherd_ref_pages.py # one api page per public symbol
  verify: scripts/gen_shepherd_api_inventory.py --check # drift gate
  pages:
    - docs/shepherd/reference/api/*.md # enumerated from the code facade (__all__)
    - docs/shepherd/reference/cli.md # from `shepherd --help` (fixture until the CLI ships)

authored:
  # --- shipped/promoted (release-ready, public) ---
  - {page: docs/shepherd/index.md, title: Home}
  - {page: docs/shepherd/start/index.md, title: Getting Started, code: docs/_src/shepherd/quickstart/world_hero.py, test: docs/_src/shepherd/quickstart/test_world_hero.py}
  - {page: docs/shepherd/tutorials/first-shepherd-app.md, title: First Shepherd app, code: docs/_src/shepherd/tutorials/first_app/app.py, test: docs/_src/shepherd/tutorials/first_app/test_first_app.py}
  - {page: docs/shepherd/concepts/tasks.md, title: Tasks}
  - {page: docs/shepherd/reference/source-state.md, title: Source-state ledger}
  - {page: docs/shepherd/workflows/index.md, title: Workflows (operator)}
  # --- start / landing scaffolds ---
  - {page: docs/shepherd/start/install.md, title: Install}
  - {page: docs/shepherd/tutorials/index.md, title: Tutorials (landing)}
  - {page: docs/shepherd/concepts/index.md, title: Concepts (landing)}
  - {page: docs/shepherd/guides/index.md, title: Guides (landing)}
  - {page: docs/shepherd/reference/index.md, title: Reference (landing)}
  # --- concept scaffolds (paradigm) ---
